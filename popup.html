<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 220px;
            padding: 12px;
            background: #1c1c1e;
            color: #f2f2f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 13px;
            margin: 0;
        }

        .title {
            font-size: 12px;
            color: #636366;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        select {
            width: 100%;
            padding: 8px 10px;
            background: #2c2c2e;
            color: #f2f2f7;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }

        select:focus {
            border-color: #0a84ff;
        }

        .saved {
            margin-top: 8px;
            color: #30d158;
            font-size: 11px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .saved.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="title">Translate to:</div>
    <select id="lang-select"></select>
    <div class="saved" id="saved">✓ Saved</div>
    <script src="popup.js"></script>
</body>

</html>
